<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MSM Companion</title>
<link rel="icon" type="image/png" href="images/favicon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7c3aed">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MSM Companion">
<link rel="apple-touch-icon" href="images/icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;
  --brd:#30363d;--brd2:#484f58;
  --tx:#e6edf3;--tx2:#8b949e;--tx3:#6e7681;
  --acc:#7c3aed;--acc2:#9d5ff4;--acl:rgba(124,58,237,0.14);
  --com:#3fb950;--rar:#58a6ff;--epi:#d29922;--leg:#f97583;
}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px;height:100vh;overflow:hidden;display:flex;flex-direction:column}
header{background:var(--bg2);border-bottom:1px solid var(--brd);padding:0 14px;display:flex;align-items:center;gap:10px;height:48px;flex-shrink:0}
.logo{font-size:16px;font-weight:700;color:var(--acc2);white-space:nowrap;margin-right:4px}
nav{display:flex;flex:1;overflow-x:auto;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
nav button{background:none;border:none;color:var(--tx2);padding:0 13px;height:48px;cursor:pointer;font-size:13px;font-weight:500;border-bottom:2px solid transparent;white-space:nowrap;transition:color .12s}
nav button:hover{color:var(--tx)}
nav button.on{color:var(--acc2);border-bottom-color:var(--acc2)}
.hbtns{display:flex;gap:6px;flex-shrink:0}
.btn{border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;white-space:nowrap;transition:background .12s;padding:6px 12px;border:1px solid var(--brd2);background:var(--bg3);color:var(--tx)}
.btn:hover{background:var(--bg4)}
.btn-pri{border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;white-space:nowrap;padding:6px 12px;border:1px solid var(--acc);background:var(--acc);color:#fff}
.btn-pri:hover{background:var(--acc2)}
.btn-sm{border-radius:6px;cursor:pointer;font-size:11px;font-weight:500;white-space:nowrap;padding:3px 8px;border:1px solid var(--brd2);background:var(--bg3);color:var(--tx)}
.btn-danger{border-radius:6px;cursor:pointer;font-size:11px;font-weight:500;white-space:nowrap;padding:3px 8px;border:1px solid #f85149;background:transparent;color:#f85149}
.btn-danger:hover{background:rgba(248,81,73,.1)}
main{flex:1;overflow:hidden}
.tab{display:none;height:100%}
.tab.on{display:flex}
.split{display:flex;height:100%}
.panel{flex:1;overflow-y:auto;padding:16px}
.sb{width:188px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--brd);overflow-y:auto;overflow-x:hidden}
.sbi{padding:7px 13px;cursor:pointer;font-size:13px;color:var(--tx2);border-left:2px solid transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sbi:hover{background:var(--bg3);color:var(--tx)}
.sbi.on{color:var(--acc2);border-left-color:var(--acc2);background:var(--acl)}
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.sc{background:var(--bg2);border:1px solid var(--brd);border-radius:10px;padding:9px 13px;min-width:95px}
.sc-lbl{font-size:11px;color:var(--tx3);margin-bottom:2px}
.sc-val{font-size:20px;font-weight:700}
.sc-sub{font-size:10px;color:var(--tx2);margin-top:1px}
select,input[type=text],input[type=number]{background:var(--bg3);border:1px solid var(--brd2);color:var(--tx);padding:5px 9px;border-radius:7px;font-size:13px;outline:none}
select:focus,input:focus{border-color:var(--acc)}
.frow{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.frow label{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--tx2);cursor:pointer}
.rbtn{background:var(--bg3);border:1px solid var(--brd);color:var(--tx3);padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer}
.rbtn:hover{color:var(--tx)}
.rbtn.on-C{background:rgba(63,185,80,.18);border-color:var(--com);color:var(--com)}
.rbtn.on-R{background:rgba(88,166,255,.18);border-color:var(--rar);color:var(--rar)}
.rbtn.on-E{background:rgba(210,153,34,.18);border-color:var(--epi);color:var(--epi)}
.bdg{font-size:10px;font-weight:600;padding:1px 5px;border-radius:4px;display:inline-block}
.bdg-C{background:rgba(63,185,80,.18);color:var(--com)}
.bdg-R{background:rgba(88,166,255,.18);color:var(--rar)}
.bdg-E{background:rgba(210,153,34,.18);color:var(--epi)}
.bdg-L{background:rgba(249,117,131,.18);color:var(--leg)}
.bdg-need{background:rgba(210,153,34,.2);color:var(--epi)}
.bdg-zap{background:rgba(188,140,255,.2);color:#bc8cff}
.bdg-wub{background:rgba(86,180,233,.18);color:#56b4e9}
.bdg-avail{background:rgba(255,140,0,.18);color:#FF8C00}
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:8px}
.mc{background:var(--bg2);border:1px solid var(--brd);border-radius:11px;padding:9px;cursor:pointer;position:relative;user-select:none;transition:background .12s,border-color .12s}
.mc:hover{background:var(--bg3)}
.mc.owned{border-color:var(--com);background:rgba(63,185,80,.07)}
.mc.needed{outline:2px solid var(--epi);outline-offset:-1px}
.mc.zneed{outline:2px solid #bc8cff;outline-offset:-1px}
.mc.wneed{outline:2px solid #56b4e9;outline-offset:-1px}
.mc.avail-now{outline:2px solid #FF8C00;outline-offset:-1px}
.mc-chk{position:absolute;top:6px;right:6px;width:17px;height:17px;border-radius:50%;background:var(--com);color:#000;font-size:10px;font-weight:700;align-items:center;justify-content:center;display:none}
.mc.owned .mc-chk{display:flex}
.mc-star{position:absolute;top:5px;right:26px;font-size:12px;display:none}
.mc.needed .mc-star{display:block}
.mc-top{display:flex;gap:7px;align-items:flex-start;margin-bottom:5px}
.mc-img{width:42px;height:42px;border-radius:6px;object-fit:contain;background:var(--bg4);flex-shrink:0;display:block}
.mc-info{flex:1;min-width:0}
.mc-name{font-size:12px;font-weight:600;line-height:1.3;word-break:break-word}
.mc-elems{display:flex;gap:2px;flex-wrap:wrap;margin-top:3px}
.mc-combo{font-size:10px;color:var(--tx2);margin-bottom:5px;line-height:1.4;word-break:break-word}
.mc-badges{display:flex;gap:3px;flex-wrap:wrap}
.esig{width:13px;height:13px;vertical-align:middle;object-fit:contain}
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{background:var(--bg3);padding:7px 10px;text-align:left;font-size:11px;color:var(--tx3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;position:sticky;top:0;z-index:1}
td{padding:7px 10px;border-bottom:1px solid var(--brd);font-size:13px;vertical-align:middle}
tr:hover td{background:var(--bg3)}
.zbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.zsc{background:var(--bg2);border:1px solid var(--brd);border-radius:10px;padding:9px 13px;flex:1;min-width:110px}
.zsc-lbl{font-size:11px;color:var(--tx3);margin-bottom:2px}
.zsc-val{font-size:22px;font-weight:700}
.zcard{background:var(--bg2);border:1px solid var(--brd);border-radius:11px;padding:13px;margin-bottom:9px}
.ztop{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.ztop-l{font-size:14px;font-weight:600}
.ztop-isl{font-size:11px;color:var(--tx3);display:block;margin-bottom:2px}
.ztop-r{display:flex;gap:6px;align-items:center;flex-shrink:0}
.dl{font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px}
.dl-ok{background:rgba(63,185,80,.15);color:var(--com)}
.dl-warn{background:rgba(210,153,34,.2);color:var(--epi)}
.dl-urg{background:rgba(248,81,73,.2);color:#f85149}
.dl-exp{background:rgba(139,148,158,.2);color:var(--tx3)}
.dl-none{background:var(--bg4);color:var(--tx3)}
.drag-handle{cursor:grab;color:var(--tx3);padding:0 6px;font-size:16px;user-select:none;flex-shrink:0}
.drag-handle:active{cursor:grabbing}
.zcard.drag-over{outline:2px solid var(--acc2);outline-offset:-2px}
.zcard.dragging{opacity:0.4}
.zprog{margin:6px 0 10px}
.zprog-lbl{font-size:11px;color:var(--tx2);margin-bottom:3px}
.pbar{background:var(--bg4);border-radius:4px;height:6px;overflow:hidden}
.pfill{height:100%;background:var(--acc2);border-radius:4px;transition:width .3s}
.pfill.done{background:var(--com)}
.eggs{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.egg{background:var(--bg3);border:1px solid var(--brd);border-radius:7px;padding:5px 8px;font-size:11px}
.egg.done{border-color:var(--com);background:rgba(63,185,80,.08)}
.egg.partial{border-color:var(--epi);background:rgba(210,153,34,.08)}
.egg-name{font-weight:600;margin-bottom:5px}
.egg-inputs{display:flex;gap:8px}
.ein{display:flex;align-items:center;gap:3px}
.ein label{font-size:10px;color:var(--tx2)}
.ein input{width:42px;background:var(--bg);border:1px solid var(--brd2);color:var(--tx);padding:2px 4px;border-radius:4px;font-size:11px;text-align:center}
.wgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:7px}
.wi{background:var(--bg3);border:1px solid var(--brd);border-radius:8px;padding:8px 10px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .12s}
.wi:hover{border-color:var(--brd2)}
.wi.boxed{border-color:var(--epi);background:rgba(210,153,34,.1)}
.wi.wi-need{outline:2px solid #56b4e9;outline-offset:-1px}
.wichk{width:18px;height:18px;border:1.5px solid var(--brd2);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:700}
.wi.boxed .wichk{background:var(--epi);border-color:var(--epi);color:#000}
.dbf{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.dbf select{width:auto}
.imgzone{background:var(--bg3);border:2px dashed var(--brd2);border-radius:11px;padding:20px;text-align:center;cursor:pointer;margin-bottom:12px;flex:1;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;transition:border-color .2s}
.imgzone:hover{border-color:var(--acc)}
.imgzone img{max-width:100%;max-height:100%;width:100%;object-fit:contain;border-radius:8px;flex:1}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;align-items:center;justify-content:center}
.overlay.on{display:flex}
.modal{background:var(--bg2);border:1px solid var(--brd2);border-radius:14px;padding:20px;width:90%;max-width:460px;max-height:85vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:13px}
.mrow{margin-bottom:9px}
.mrow label{display:block;font-size:12px;color:var(--tx2);margin-bottom:3px}
.mrow select,.mrow input{width:100%}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:13px}
.tag{display:inline-block;background:var(--bg4);color:var(--tx2);padding:1px 5px;border-radius:4px;font-size:11px;margin:1px}
.pill{background:var(--acl);border:1px solid var(--acc);color:var(--acc2);padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.empty{text-align:center;padding:40px;color:var(--tx3);font-size:13px}
.hint{font-size:11px;color:var(--tx3);margin-top:10px}
.lbanner{background:rgba(88,166,255,.1);border:1px solid rgba(88,166,255,.3);border-radius:8px;padding:9px 13px;margin-bottom:12px;font-size:13px;display:flex;align-items:center;gap:8px}
.lbanner a{color:var(--rar);text-decoration:none}
.lbanner a:hover{text-decoration:underline}
.cnt{font-size:12px;color:var(--tx3);margin-bottom:9px}
hr{border:none;border-top:1px solid var(--brd);margin:13px 0}
.typbtns{display:flex;gap:6px;margin-bottom:13px;flex-wrap:wrap}
.br-sep td{border-top:2px solid var(--brd2)!important}
input[type=file]{display:none}
/* ── TABLET (769–1024px) ─────────────────────────────────────────────────── */
@media (min-width:769px) and (max-width:1024px){
  .sb{width:168px}
  .mgrid{grid-template-columns:repeat(auto-fill,minmax(148px,1fr))}
  .wgrid{grid-template-columns:repeat(auto-fill,minmax(185px,1fr))}
  nav button{padding:0 10px;font-size:12px}
}

/* ── MOBILE (≤768px) ─────────────────────────────────────────────────────── */
@media (max-width:768px){
  /* Body — page scrolls; pad bottom so content clears the fixed tab bar */
  body{font-size:13px;overflow:auto;padding-bottom:calc(62px + env(safe-area-inset-bottom,0px))}

  /* ── HEADER: compact, nav leaves the flow ── */
  header{padding:0 8px;gap:6px;height:42px}
  .logo{font-size:13px}
  /* Hide Save/Load from header — both are accessible via the Save tab */
  #syncStatus{display:none !important}
  .hbtns{gap:3px}
  .hbtns>.btn:not(#authBtn){display:none}
  #authBtn{padding:3px 8px;font-size:11px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* ── BOTTOM TAB BAR ── */
  /* The existing <nav> is pulled out of header flow via position:fixed
     so setNavActive() keeps working — .on class stays on the correct button */
  nav{
    position:fixed;bottom:0;left:0;right:0;
    z-index:200;
    background:var(--bg2);
    border-top:1px solid var(--brd);
    height:auto;
    padding-bottom:env(safe-area-inset-bottom,0px);
    overflow-x:auto;overflow-y:hidden;
    scrollbar-width:none;
    flex:none;display:flex
  }
  nav::-webkit-scrollbar{display:none}
  nav button{
    flex-direction:column;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    height:auto;min-height:56px;
    padding:4px 12px 6px;
    font-size:10px;gap:2px;
    border-bottom:none !important;
    border-top:2px solid transparent;
    white-space:nowrap
  }
  /* Active state: purple top-border indicator (nav is at screen bottom, so top of button = visible edge) */
  nav button.on{color:var(--acc2);border-top-color:var(--acc2);border-bottom-color:transparent !important}
  nav button:hover{color:var(--tx)}

  /* Tab icons injected via CSS so no JS is needed */
  nav button:nth-child(1)::before{content:"📦";font-size:17px;display:block;line-height:1}
  nav button:nth-child(2)::before{content:"🥚";font-size:17px;display:block;line-height:1}
  nav button:nth-child(3)::before{content:"⚡";font-size:17px;display:block;line-height:1}
  nav button:nth-child(4)::before{content:"📤";font-size:17px;display:block;line-height:1}
  nav button:nth-child(5)::before{content:"⭐";font-size:17px;display:block;line-height:1}
  nav button:nth-child(6)::before{content:"🔍";font-size:17px;display:block;line-height:1}
  nav button:nth-child(7)::before{content:"🏝️";font-size:17px;display:block;line-height:1}
  nav button:nth-child(8)::before{content:"💾";font-size:17px;display:block;line-height:1}

  /* ── MAIN LAYOUT ── */
  main{overflow:visible}
  .tab{height:auto}
  .tab.on{flex-direction:column}
  .split{flex-direction:column;height:auto}

  /* ── SIDEBAR → horizontal scrollable strip ── */
  .sb{
    width:100%;height:auto;
    border-right:none;border-bottom:1px solid var(--brd);
    overflow-x:auto;overflow-y:hidden;
    display:flex;flex-direction:row;
    padding:0;scrollbar-width:none;flex-shrink:0
  }
  .sb::-webkit-scrollbar{display:none}
  .sbi{
    border-left:none;border-bottom:2px solid transparent;
    padding:10px 14px;min-height:44px;
    white-space:nowrap;display:inline-flex;align-items:center;flex-shrink:0
  }
  .sbi.on{border-bottom-color:var(--acc2);background:var(--acl)}

  /* ── PANEL ── */
  .panel{padding:10px}

  /* ── MONSTER GRID ── */
  .mgrid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px}
  .mc{padding:7px}
  .mc-img{width:36px;height:36px}

  /* ── STATS CARDS ── */
  .stats{gap:5px}
  .sc{padding:6px 9px;min-width:70px}
  .sc-val{font-size:16px}
  .sc-lbl{font-size:10px}

  /* ── TABLES: horizontal scroll + sticky first column ── */
  .twrap{overflow-x:auto;-webkit-overflow-scrolling:touch;font-size:12px}
  .twrap table{min-width:480px}
  td,th{padding:5px 8px}
  /* Sticky monster-name column so it doesn't scroll away */
  th:first-child,td:first-child{position:sticky;left:0;z-index:2}
  th:first-child{background:var(--bg3)}
  td:first-child{background:var(--bg)}
  tr:hover td:first-child{background:var(--bg3)}

  /* ── WUBBOX ── */
  .wgrid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:5px}
  .wi{min-height:44px}

  /* ── ZAPPING ── */
  .zcard{padding:10px}
  .zbar{gap:5px;flex-wrap:wrap}
  .zsc{padding:7px 10px;min-width:90px}
  .eggs{gap:5px;flex-wrap:wrap}
  .egg{padding:4px 6px}
  .ztop{flex-wrap:wrap;gap:6px}
  .ztop-r{flex-wrap:wrap}

  /* ── FILTER ROWS: wrap + stretch inputs ── */
  .frow{gap:6px;flex-wrap:wrap}
  .frow select,.frow input[type=text],.frow input[type=number]{flex:1;min-width:110px;width:auto !important}
  .dbf{flex-wrap:wrap;gap:6px}
  .dbf select,.dbf input[type=text]{flex:1 1 140px;min-width:0;width:auto !important;max-width:none !important}

  /* iOS: prevent auto-zoom when tapping inputs (requires font-size ≥16px) */
  select,input[type=text],input[type=number],input[type=email],input[type=password]{font-size:16px}

  /* ── TOUCH TARGETS ── */
  .btn,.btn-pri{min-height:40px;display:inline-flex;align-items:center;justify-content:center}
  .rbtn{min-height:38px;padding:6px 10px;display:inline-flex;align-items:center;justify-content:center}
  .btn-sm{min-height:34px;display:inline-flex;align-items:center;justify-content:center}

  /* ── MODALS: bottom sheet ── */
  .overlay{align-items:flex-end}
  .modal{
    width:100%;max-width:100% !important;
    border-radius:16px 16px 0 0;
    padding:18px 14px;
    max-height:90vh;
    padding-bottom:calc(18px + env(safe-area-inset-bottom,0px))
  }

  /* ── SAVE / LOAD TAB: two-column → single column ── */
  /* The grid uses an inline style, so !important is required to override it */
  #main [style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr !important}

  /* ── AVAILABLE ADD MODAL filter rows ── */
  #availAddModal .frow{flex-direction:column;align-items:stretch}
  #availAddModal .frow select,#availAddModal .frow input{width:100% !important;max-width:none !important}
}

/* ── AVAILABLE-TAB card (orange accent, distinct from owned/green) ── */
.mc.avail-card{border-color:#FF8C00;background:rgba(255,140,0,.07)}
.mc.avail-card:hover{background:rgba(255,140,0,.12)}

/* ── Sidebar section separator label ── */
.sb-sep{padding:5px 13px 3px;font-size:10px;font-weight:700;color:var(--tx3);
  text-transform:uppercase;letter-spacing:.6px;white-space:nowrap;flex-shrink:0}
@media (max-width:768px){.sb-sep{padding:5px 10px 3px}}

/* ── Needed-toggle star button on collection cards ── */
.mc-need-btn{
  position:absolute;top:4px;right:26px;
  background:none;border:none;cursor:pointer;
  font-size:15px;padding:3px;line-height:1;
  color:var(--tx3);transition:color .12s;
}
.mc-need-btn:hover{color:var(--epi)}
.mc.needed .mc-need-btn{color:var(--epi)}
</style>
</head>
<body>
<header>
  <div class="logo">&#127925; MSM Companion</div>
  <nav id="nav"></nav>
  <div class="hbtns">
    <span id="syncStatus" style="font-size:11px;color:var(--tx3);display:none"></span>
    <button class="btn" onclick="doSave()">&#128190; Save</button>
    <button class="btn" onclick="document.getElementById('fload').click()">&#128194; Load</button>
    <input type="file" id="fload" accept=".json" onchange="doLoad(event)">
    <button class="btn" id="authBtn" style="border-color:var(--acc);color:var(--acc2)" onclick="openAuthModal()">&#9729; Sign In</button>
  </div>
</header>
<main id="main"></main>

<div class="overlay" id="zapModal">
  <div class="modal">
    <h3>Track Zapping Monster</h3>
    <div class="mrow"><label>Island</label>
      <select id="zm_island">
        <option>Wublin Island</option>
        <option>Amber Island</option>
        <option>Celestial Island</option>
      </select>
    </div>
    <div class="mrow"><label>Monster</label><select id="zm_mon"></select></div>
    <div class="mrow"><label>Days until deadline (0 = no deadline)</label>
      <input type="number" id="zm_days" min="0" max="400" value="2">
    </div>
    <div class="mact">
      <button class="btn" onclick="closeZapModal()">Cancel</button>
      <button class="btn-pri" onclick="confirmZap()">Track</button>
    </div>
  </div>
</div>

<div class="overlay" id="availModal">
  <div class="modal">
    <h3 id="av_title">Mark as Available</h3>
    <div class="mrow">
      <label>Days available (leave blank for no expiry)</label>
      <input type="number" id="av_days" min="1" max="365" placeholder="e.g. 7" style="width:100%">
    </div>
    <div class="mact">
      <button class="btn" onclick="closeAvailModal()">Cancel</button>
      <button class="btn-pri" onclick="confirmAvail()">Mark Available</button>
    </div>
  </div>
</div>

<div class="overlay" id="availAddModal">
  <div class="modal" style="max-width:560px">
    <h3>Add Available Monster</h3>
    <div class="frow" style="margin-bottom:6px;gap:6px">
      <input type="text" id="aas_srch" placeholder="&#128269; Search…" style="flex:1;min-width:0">
      <select id="aas_rar"><option value="">All Rarities</option><option value="Common">Common</option><option value="Rare">Rare</option><option value="Epic">Epic</option><option value="Legendary">Legendary</option></select>
      <select id="aas_cls" style="max-width:130px"><option value="">All Classes</option></select>
    </div>
    <div class="frow" style="margin-bottom:8px;gap:6px">
      <select id="aas_elem" style="flex:1;min-width:0"><option value="">All Elements</option></select>
      <select id="aas_isl" style="flex:1;min-width:0"><option value="">All Islands</option></select>
    </div>
    <div id="aas_list" style="max-height:300px;overflow-y:auto;border:1px solid var(--brd);border-radius:8px"></div>
    <div class="mact" style="margin-top:10px;justify-content:space-between">
      <button class="btn" onclick="closeAvailAddModal()">Cancel</button>
      <button class="btn-pri" id="aas_addBtn" onclick="openAvailBatch()" style="opacity:.45;cursor:not-allowed" disabled>Add 0 Selected</button>
    </div>
  </div>
</div>

<div class="overlay" id="authModal">
  <div class="modal" style="max-width:380px">
    <h3 id="auth_title">Sign In</h3>
    <p style="font-size:12px;color:var(--tx3);margin-bottom:14px">Sign in to sync your progress across devices automatically.</p>
    <div class="mrow"><label>Email</label>
      <input type="email" id="auth_email" placeholder="you@example.com" style="width:100%" autocomplete="email">
    </div>
    <div class="mrow"><label>Password</label>
      <input type="password" id="auth_pass" placeholder="Password" style="width:100%" autocomplete="current-password">
    </div>
    <div id="auth_err" style="font-size:12px;color:#f85149;min-height:18px;margin-bottom:4px"></div>
    <div class="mact">
      <button class="btn" onclick="closeAuthModal()">Cancel</button>
      <button class="btn-pri" id="auth_submit" onclick="doAuth()">Sign In</button>
    </div>
    <div style="text-align:center;margin-top:12px;font-size:12px;color:var(--tx3)">
      <span id="auth_toggle_lbl">Don't have an account?</span>
      <button class="btn" style="padding:2px 8px;font-size:11px;margin-left:5px" onclick="toggleAuthMode()">Sign Up</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="data.js"></script>
<script>

// STATE
var S = {
  tab:0,
  colIsland:"Plant Island", colRarity:"", colHideOwned:false, colNeedOnly:false,
  brIsland:"Plant Island", brRarity:"", brHideOwned:false, brBreedOnly:false, brSearch:"",
  wbIsland:"Plant Island", wbType:"common",
  dbSearch:"", dbRarity:"", dbClass:"", dbElem:"", dbIsland:"",
  islandSel:"Plant Island",
  avSearch:"", avRarity:"", avClass:"",
  owned:{}, needed:{}, zapTracked:{}, wubboxBoxed:{}, islandImages:{}, wubNeeded:{}, zapOrder:{},
  avail:{}
};
function loadS(){try{var r=localStorage.getItem("msm4");if(r)Object.assign(S,JSON.parse(r));}catch(e){}}
function saveS(){
  try{localStorage.setItem("msm4",JSON.stringify(S));}catch(e){}
  if(typeof scheduleSyncSave==="function")scheduleSyncSave();
}
var _drt=null;
function debounceRender(){clearTimeout(_drt);_drt=setTimeout(renderAll,150);}

// TABS
var TABS=["Collection","Breeding","Zapping","Wubbox","Available","Database","Islands","Save / Load"];
function initNav(){
  var nav=document.getElementById("nav");
  TABS.forEach(function(t,i){
    var b=document.createElement("button");
    b.textContent=t;
    b.onclick=function(){S.tab=i;saveS();renderAll();};
    nav.appendChild(b);
  });
}
function setNavActive(){document.querySelectorAll("nav button").forEach(function(b,i){b.classList.toggle("on",i===S.tab);});}
var _focusId=null;
function renderAll(){
  var focused=document.activeElement;
  if(focused&&focused.tagName==="INPUT"&&focused.id)_focusId=focused.id;
  setNavActive();
  document.getElementById("main").innerHTML="";
  [renderCollection,renderBreeding,renderZapping,renderWubbox,renderAvailable,renderDatabase,renderIslands,renderSaveLoad][S.tab]();
  if(_focusId){
    var el=document.getElementById(_focusId);
    if(el){el.focus();var v=el.value;el.value="";el.value=v;}
    _focusId=null;
  }
}

// HELPERS
var ISO=DB.islandOrder;
// ── initDB: build backward-compat indexes from new monster-centric data.js ───
function initDB(){
  // Build DB.islands[islandName] = [{n, b, t}, ...] from monster island appearances.
  // Names use legacy "MonsterName (Rarity)" format to preserve existing saved state keys.
  DB.islands={};
  DB.monsters.forEach(function(m){
    // Compute legacy m.i (island name list) and m.t (representative time)
    m.i=(m.islands||[]).map(function(a){return a.island;});
    var fa=(m.islands||[]).find(function(a){return a.time;});
    m.t=fa?(fa.enhanced?fa.time+" / "+fa.enhanced:fa.time):"";

    (m.islands||[]).forEach(function(a){
      if(!DB.islands[a.island])DB.islands[a.island]=[];
      // Reconstruct combo display string in original N/A format for breedable-only filter
      var bStr;
      if(a.combo){bStr=a.combo.join(" + ");}
      else if(a.obtain==="Teleport"||a.obtain==="Zapping"){bStr=a.obtain||"";}
      else if(a.obtain){bStr="N/A ("+a.obtain+")";}
      else{bStr="";}
      DB.islands[a.island].push({
        n:m.n+" ("+m.r+")",  // "Potbelly (Common)" — matches S.owned key format
        b:bStr,
        t:a.time?(a.enhanced?a.time+" / "+a.enhanced:a.time):"",
        _combo:a.combo,
        _appearance:a,
        _monster:m
      });
    });
  });

  // Build DB.zapping[islandName] = [{n, e, l}, ...] from zapTargets
  DB.zapping={};
  (DB.zapTargets||[]).forEach(function(t){
    if(!DB.zapping[t.island])DB.zapping[t.island]=[];
    DB.zapping[t.island].push({
      n:t.n,
      e:t.requirements.map(function(r){return r.monster+" x"+r.eggs;}).join(", "),
      l:t.limit,
      _target:t
    });
  });
}

function isOwned(isl,n){return !!(S.owned[isl]&&S.owned[isl][n]);}
function setOwned(isl,n,v){if(!S.owned[isl])S.owned[isl]={};if(v)S.owned[isl][n]=1;else delete S.owned[isl][n];saveS();}
function isNeeded(isl,n){return !!(S.needed[isl]&&S.needed[isl][n]);}
function setNeeded(isl,n,v){if(!S.needed[isl])S.needed[isl]={};if(v)S.needed[isl][n]=1;else delete S.needed[isl][n];saveS();}
function isWubNeeded(island,type,mn){return !!(S.wubNeeded&&S.wubNeeded[island+"__"+type+"__"+mn]);}
function setWubNeeded(island,type,mn,v){
  if(!S.wubNeeded)S.wubNeeded={};
  var k=island+"__"+type+"__"+mn;
  if(v)S.wubNeeded[k]=1;else delete S.wubNeeded[k];saveS();
}
function wubNeededFor(monsterName){
  if(!S.wubNeeded)return[];
  var clean=cleanN(monsterName).toLowerCase(),res=[];
  Object.keys(S.wubNeeded).forEach(function(k){
    if(!S.wubNeeded[k])return;
    var p=k.split("__");
    if(p.length<3)return;
    if(cleanN(p[2]).toLowerCase()===clean)
      res.push(p[0]+" ("+p[1].charAt(0).toUpperCase()+p[1].slice(1)+" Wubbox)");
  });
  return res;
}
function rar(name){
  var n=name.toLowerCase();
  if(n.startsWith("epic ")||n.indexOf("(epic)")>-1)return"E";
  if(n.startsWith("rare ")||n.indexOf("(rare)")>-1)return"R";
  return"C";
}
function rarLabel(r){return r==="E"?"Epic":r==="R"?"Rare":"Common";}
function cleanN(name){return name.replace(/\s*\((Common|Rare|Epic|Legendary|Young|Adult)\)\s*/gi,"").trim();}
function bdg(r){return '<span class="bdg bdg-'+r+'">'+rarLabel(r)+'</span>';}
function getIslandMons(key){
  return (DB.islands[key]||[]).filter(function(m){return m.n.indexOf("Box Requirements")===-1;});
}
function zapNeeded(monName){
  var clean=cleanN(monName).toLowerCase(),res=[];
  Object.entries(S.zapTracked).forEach(function(e){
    var z=e[1];
    var eggs=parseEggs(z.eggs_required||"");
    Object.entries(eggs).forEach(function(ee){
      var s=(z.sent&&z.sent[ee[0]])||0,b=(z.bred&&z.bred[ee[0]])||0;
      if(s+b<ee[1]&&cleanN(ee[0]).toLowerCase()===clean)res.push(z.monster_name);
    });
  });
  return res;
}
function parseEggs(str){
  var r={};
  if(!str||!str.trim())return r;
  str.split(",").forEach(function(p){var m=p.trim().match(/^(.+?)\s+x(\d+)$/);if(m)r[m[1].trim()]=parseInt(m[2]);});
  return r;
}
function daysLeft(iso){if(!iso)return null;return Math.max(0,Math.ceil((new Date(iso)-new Date())/86400000));}
function dbEntry(name){
  var cl=cleanN(name).toLowerCase();
  return DB.monsters.find(function(m){return m.n.toLowerCase()===name.toLowerCase()||cleanN(m.n).toLowerCase()===cl;});
}

// IMAGES
var DIPSTER_NAMES={"Do":1,"Re":1,"Mi":1,"Fa":1,"Sol":1,"La":1,"Ti":1};
var WUBBOX_ISLANDS={"Plant Island":"Plant","Cold Island":"Cold","Air Island":"Air",
  "Water Island":"Water","Earth Island":"Earth","Fire Haven":"Haven",
  "Fire Oasis":"Oasis","Ethereal Island":"Ethereal","Gold Island":"Gold",
  // Mirror islands use the same Epic Wubbox variant as their non-mirror counterpart
  "Mirror Plant Island":"Plant","Mirror Cold Island":"Cold",
  "Mirror Air Island":"Air","Mirror Water Island":"Water",
  "Mirror Earth Island":"Earth"};
function monImgSrc(name,islandCtx){
  var r=rar(name);
  // Strip 'Rare '/'Epic '/'Adult ' prefix before building base name
  var base=cleanN(name).replace(/^(Rare|Epic|Adult)\s+/i,"").replace(/'/g,"_");
  // Dipsters: 'Dipster - Do.png'
  if(DIPSTER_NAMES[base])return "images/Monster Portrait Squares/Dipster - "+base+".png";
  // Paironormals: name already has (Major)/(Minor) in it via cleanN keeping those
  // e.g. 'Arcorina (Major)' -> base='Arcorina (Major)' -> 'Arcorina (Major).png'
  // Adult celestials: 'Attmoz - adult.png'
  if(/^adult\s/i.test(name))return "images/Monster Portrait Squares/"+base+" - adult.png";
  // Epic Wubbox: 'Wubbox - Epic (Plant).png'
  if(/^epic\s+wubbox/i.test(name.trim())&&islandCtx){
    var isle=WUBBOX_ISLANDS[islandCtx]||islandCtx;
    return "images/Monster Portrait Squares/Wubbox - Epic ("+isle+").png";
  }
  var suffix=r==="R"?" - Rare":r==="E"?" - Epic":"";
  return "images/Monster Portrait Squares/"+base+suffix+".png";
}
function monImg(name,size){
  size=size||40;
  return '<img src="'+monImgSrc(name)+'" width="'+size+'" height="'+size+'" class="mc-img" onerror="this.style.opacity=0.1" alt="">';
}
function monImgWithCtx(name,island,size){
  size=size||40;
  return '<img src="'+monImgSrc(name,island)+'" width="'+size+'" height="'+size+'" class="mc-img" onerror="this.style.opacity=0.1" alt="">';
}
function elemImg(el){
  return '<img src="images/elements/'+el.toLowerCase()+'.png" class="esig" onerror="this.style.opacity=0" alt="'+el+'" title="'+el+'">';
}

// SIDEBAR
function makeSidebar(activeKey,onClickFn){
  var sb=document.createElement("div");sb.className="sb";
  ISO.forEach(function(name){
    if(!DB.islands[name]&&!DB.zapping[name])return;
    var d=document.createElement("div");d.className="sbi"+(activeKey===name?" on":"");
    d.textContent=name;
    d.addEventListener("click",function(){onClickFn(name);});
    sb.appendChild(d);
  });
  return sb;
}
function makeSplit(){var d=document.createElement("div");d.className="tab on split";return d;}
function makePanel(){var d=document.createElement("div");d.className="panel";return d;}

// ZAP MODAL
function openZapModal(){
  zmFillMons(document.getElementById("zm_island").value);
  document.getElementById("zapModal").classList.add("on");
}
function closeZapModal(){document.getElementById("zapModal").classList.remove("on");}
function zmFillMons(isl){
  var sel=document.getElementById("zm_mon");
  if(!sel)return;
  sel.innerHTML="";
  (DB.zapping[isl]||[]).forEach(function(m){
    var o=document.createElement("option");
    o.value=m.n;
    o.textContent=m.n+" — "+(m.l||"no deadline");
    o.setAttribute("data-eggs",m.e||"");
    sel.appendChild(o);
  });
}
function confirmZap(){
  var isl=document.getElementById("zm_island").value;
  var sel=document.getElementById("zm_mon");
  if(!sel||!sel.value)return;
  var opt=sel.options[sel.selectedIndex];
  var eggs=opt?opt.getAttribute("data-eggs")||"":"";
  var days=parseInt(document.getElementById("zm_days").value)||0;
  var deadline=days>0?new Date(Date.now()+days*86400000).toISOString():null;
  S.zapTracked[isl+"__"+Date.now()]={island:isl,monster_name:sel.value,eggs_required:eggs,deadline:deadline,sent:{},bred:{}};
  saveS();closeZapModal();renderAll();
}
document.getElementById("zm_island").addEventListener("change",function(){zmFillMons(this.value);});

// COLLECTION
function renderCollection(){
  var wrap=makeSplit();
  wrap.appendChild(makeSidebar(S.colIsland,function(name){S.colIsland=name;saveS();renderAll();}));
  var c=makePanel();wrap.appendChild(c);
  document.getElementById("main").appendChild(wrap);

  var key=S.colIsland;
  // Amber has both island (collection) and zapping data - show island data for collection
  var isZap=!!DB.zapping[key]&&!DB.islands[key];
  var allMons=isZap?DB.zapping[key]:getIslandMons(key);
  var ownedCount=allMons.filter(function(m){return isOwned(key,m.n);}).length;
  var neededCount=Object.values(S.needed[key]||{}).filter(Boolean).length;

  var st=document.createElement("div");st.className="stats";
  st.innerHTML='<div class="sc"><div class="sc-lbl">Owned</div><div class="sc-val">'+ownedCount+'</div></div>'+
    '<div class="sc"><div class="sc-lbl">Available</div><div class="sc-val">'+allMons.length+'</div></div>'+
    '<div class="sc"><div class="sc-lbl">Still Needed</div><div class="sc-val">'+(allMons.length-ownedCount)+'</div></div>'+
    '<div class="sc"><div class="sc-lbl">Marked Needed</div><div class="sc-val">'+neededCount+'</div></div>';
  c.appendChild(st);

  var hdr=document.createElement("div");
  hdr.style.cssText="display:flex;align-items:center;gap:9px;margin-bottom:11px";
  hdr.innerHTML='<span style="font-size:15px;font-weight:700">'+key+'</span><span class="pill">'+(isZap?"Zapping":"Breeding")+'</span>';
  c.appendChild(hdr);

  var fr=document.createElement("div");fr.className="frow";
  fr.innerHTML=
    '<button class="rbtn'+(S.colRarity==="C"?" on-C":"")+'" id="rc_C">Common</button>'+
    '<button class="rbtn'+(S.colRarity==="R"?" on-R":"")+'" id="rc_R">Rare</button>'+
    '<button class="rbtn'+(S.colRarity==="E"?" on-E":"")+'" id="rc_E">Epic</button>'+
    '<label><input type="checkbox" id="rc_HO"'+(S.colHideOwned?" checked":"")+'>  Hide owned</label>'+
    '<label><input type="checkbox" id="rc_SN"'+(S.colNeedOnly?" checked":"")+'>  Needed only</label>';
  c.appendChild(fr);
  document.getElementById("rc_C").onclick=function(){S.colRarity=S.colRarity==="C"?"":"C";saveS();renderAll();};
  document.getElementById("rc_R").onclick=function(){S.colRarity=S.colRarity==="R"?"":"R";saveS();renderAll();};
  document.getElementById("rc_E").onclick=function(){S.colRarity=S.colRarity==="E"?"":"E";saveS();renderAll();};
  document.getElementById("rc_HO").onchange=function(){S.colHideOwned=this.checked;saveS();renderAll();};
  document.getElementById("rc_SN").onchange=function(){S.colNeedOnly=this.checked;saveS();renderAll();};

  var list=allMons.slice();
  if(S.colRarity)list=list.filter(function(m){return rar(m.n)===S.colRarity;});
  if(S.colHideOwned)list=list.filter(function(m){return !isOwned(key,m.n);});
  if(S.colNeedOnly)list=list.filter(function(m){return isNeeded(key,m.n);});

  if(!list.length){var emp=document.createElement("div");emp.className="empty";emp.textContent="No monsters match the filters.";c.appendChild(emp);return;}

  var grid=document.createElement("div");grid.className="mgrid";
  list.forEach(function(m){
    var owned=isOwned(key,m.n);
    var need=isNeeded(key,m.n);
    var zn=zapNeeded(m.n);
    var wbn=wubNeededFor(m.n);
    var r=rar(m.n);
    var db=dbEntry(m.n);
    var elems=db?db.e:[];
    var avKey2=db?db.n+" ("+db.r+")":"";
    var isAvCard=avKey2?isAvailNow(avKey2):false;
    var card=document.createElement("div");
    card.className="mc"+(owned?" owned":"")+(isAvCard?" avail-now":"")+(need?" needed":"")+(zn.length&&!owned?" zneed":"")+(wbn.length&&!owned?" wneed":"");
    card.innerHTML=
      '<div class="mc-chk">✓</div><div class="mc-star">⭐</div>'+
      '<div class="mc-top">'+monImgWithCtx(m.n,key,42)+
        '<div class="mc-info"><div class="mc-name">'+cleanN(m.n)+'</div>'+
        '<div class="mc-elems">'+elems.slice(0,4).map(elemImg).join("")+'</div></div></div>'+
      '<div class="mc-combo">'+(m.b||(isZap?(m.e||""):""))+'</div>'+
      '<div class="mc-badges">'+bdg(r)+
        (isAvCard?'<span class="bdg bdg-avail">&#9733; Available</span>':"")+
        (need?'<span class="bdg bdg-need">Needed</span>':"")+
        (zn.length?'<span class="bdg bdg-zap">Zap: '+zn[0]+'</span>':"")+
        (wbn.length?'<span class="bdg bdg-wub">Wubbox</span>':"")+
      '</div>';
    card.addEventListener("click",function(e){
      if(e.shiftKey){setNeeded(key,m.n,!isNeeded(key,m.n));}
      else{setOwned(key,m.n,!isOwned(key,m.n));}
      renderAll();
    });
    grid.appendChild(card);
  });
  c.appendChild(grid);
  var hint=document.createElement("div");hint.className="hint";hint.textContent="Click = toggle owned · Shift+click = mark as needed";c.appendChild(hint);
}

// BREEDING
function renderBreeding(){
  // Pre-compute which islands have at least one breedable combo
  var breedIslandSet=new Set();
  DB.monsters.forEach(function(m){
    (m.islands||[]).forEach(function(a){if(a.combo&&a.combo.length)breedIslandSet.add(a.island);});
  });

  // If current island has no combos, reset to ALL
  if(S.brIsland!=="ALL"&&S.brIsland!=="AVAIL"&&S.brIsland!=="NEEDED"&&S.brIsland!=="ZAP"&&S.brIsland!=="WUB"&&!breedIslandSet.has(S.brIsland)){
    S.brIsland="ALL";
  }

  var wrap=makeSplit();
  var sb=document.createElement("div");sb.className="sb";
  [["ALL","All Islands"],["AVAIL","⭐ Available"],["NEEDED","★ Needed Only"],["ZAP","⚡ For Zapping"],["WUB","For Wubbox"]].forEach(function(kv){
    var d=document.createElement("div");d.className="sbi"+(S.brIsland===kv[0]?" on":"");
    d.textContent=kv[1];d.addEventListener("click",function(){S.brIsland=kv[0];saveS();renderAll();});sb.appendChild(d);
  });
  ISO.forEach(function(name){
    if(!breedIslandSet.has(name))return;
    var d=document.createElement("div");d.className="sbi"+(S.brIsland===name?" on":"");
    d.textContent=name;d.addEventListener("click",function(){S.brIsland=name;saveS();renderAll();});sb.appendChild(d);
  });
  wrap.appendChild(sb);
  var c=makePanel();wrap.appendChild(c);
  document.getElementById("main").appendChild(wrap);


  var fr=document.createElement("div");fr.className="frow";
  fr.innerHTML=
    '<input type="text" id="brSrch" placeholder="Search…" value="'+S.brSearch+'" style="width:160px">'+
    '<button class="rbtn'+(S.brRarity==="C"?" on-C":"")+'" id="br_C">Common</button>'+
    '<button class="rbtn'+(S.brRarity==="R"?" on-R":"")+'" id="br_R">Rare</button>'+
    '<button class="rbtn'+(S.brRarity==="E"?" on-E":"")+'" id="br_E">Epic</button>'+
    '<label><input type="checkbox" id="br_HO"'+(S.brHideOwned?" checked":"")+'>  Hide owned</label>';
  c.appendChild(fr);
  document.getElementById("brSrch").oninput=function(){S.brSearch=this.value;saveS();debounceRender();};
  document.getElementById("br_C").onclick=function(){S.brRarity=S.brRarity==="C"?"":"C";saveS();renderAll();};
  document.getElementById("br_R").onclick=function(){S.brRarity=S.brRarity==="R"?"":"R";saveS();renderAll();};
  document.getElementById("br_E").onclick=function(){S.brRarity=S.brRarity==="E"?"":"E";saveS();renderAll();};
  document.getElementById("br_HO").onchange=function(){S.brHideOwned=this.checked;saveS();renderAll();};

  var key=S.brIsland;

  // Build list of {m, apps[], _needed, _zapTags, _wubFor}
  // apps = island appearances with a breeding combo
  var monItems=[];

  function addMonItem(m,apps,extras){
    if(!apps.length)return;
    if(S.brSearch&&m.n.toLowerCase().indexOf(S.brSearch.toLowerCase())===-1)return;
    if(S.brRarity&&rar(m.n)!==S.brRarity)return;
    if(S.brHideOwned){
      var legN=m.n+" ("+m.r+")";
      if(apps.every(function(a){return isOwned(a.island,legN);}))return;
    }
    monItems.push(Object.assign({m:m,apps:apps},extras||{}));
  }

  if(key==="ALL"){
    DB.monsters.forEach(function(m){
      addMonItem(m,(m.islands||[]).filter(function(a){return a.combo&&a.combo.length;}),{});
    });
  } else if(key==="NEEDED"){
    DB.monsters.forEach(function(m){
      var legN=m.n+" ("+m.r+")";
      if(!(m.islands||[]).some(function(a){return isNeeded(a.island,legN);}))return;
      addMonItem(m,(m.islands||[]).filter(function(a){return a.combo&&a.combo.length;}),{_needed:true});
    });
  } else if(key==="ZAP"){
    var zapEggMap={};
    Object.values(S.zapTracked||{}).forEach(function(z){
      var eggs=parseEggs(z.eggs_required||"");
      Object.entries(eggs).forEach(function(ee){
        var s=(z.sent&&z.sent[ee[0]])||0,b=(z.bred&&z.bred[ee[0]])||0;
        if(s+b>=ee[1])return;
        var cl=cleanN(ee[0]).toLowerCase();
        if(!zapEggMap[cl])zapEggMap[cl]=[];
        zapEggMap[cl].push({name:z.monster_name,still:ee[1]-s-b});
      });
    });
    DB.monsters.forEach(function(m){
      var zt=zapEggMap[cleanN(m.n).toLowerCase()];
      if(!zt)return;
      addMonItem(m,(m.islands||[]).filter(function(a){return a.combo&&a.combo.length;}),{_zapTags:zt});
    });
  } else if(key==="AVAIL"){
    DB.monsters.forEach(function(m){
      var avk=m.n+" ("+m.r+")";
      if(!isAvailNow(avk))return;
      addMonItem(m,(m.islands||[]).filter(function(a){return a.combo&&a.combo.length;}),{_avail:true});
    });
  } else if(key==="WUB"){
    var wubMonMap={};
    Object.keys(S.wubNeeded||{}).forEach(function(k){
      if(!S.wubNeeded[k])return;
      var p=k.split("__");if(p.length<3)return;
      var cl=cleanN(p[2]).toLowerCase();
      if(!wubMonMap[cl])wubMonMap[cl]=[];
      wubMonMap[cl].push(p[0]+" ("+(p[1].charAt(0).toUpperCase()+p[1].slice(1))+" Wubbox)");
    });
    DB.monsters.forEach(function(m){
      var wf=wubMonMap[cleanN(m.n).toLowerCase()];
      if(!wf)return;
      addMonItem(m,(m.islands||[]).filter(function(a){return a.combo&&a.combo.length;}),{_wubFor:wf.join(", ")});
    });
  } else {
    DB.monsters.forEach(function(m){
      addMonItem(m,(m.islands||[]).filter(function(a){return a.combo&&a.combo.length&&a.island===key;}),{});
    });
  }

  var cnt=document.createElement("div");cnt.className="cnt";cnt.textContent=monItems.length+" monsters";c.appendChild(cnt);
  if(!monItems.length){var emp=document.createElement("div");emp.className="empty";emp.textContent="No results.";c.appendChild(emp);return;}

  var tw=document.createElement("div");tw.className="twrap";
  var tbl=document.createElement("table");
  tbl.innerHTML='<thead><tr><th>Monster</th><th>Island</th><th>Combo</th><th>Time</th><th>Status</th></tr></thead>';
  var tb=document.createElement("tbody");

  monItems.forEach(function(item){
    var m=item.m,apps=item.apps;
    var legN=m.n+" ("+m.r+")";
    var r=rar(m.n);

    apps.forEach(function(a,idx){
      var tr=document.createElement("tr");
      if(idx===0)tr.className="br-sep";
      var ownedHere=isOwned(a.island,legN);

      if(idx===0){
        var wbn=wubNeededFor(m.n);
        var tdM=document.createElement("td");
        tdM.rowSpan=apps.length;
        tdM.style.verticalAlign="top";
        tdM.style.paddingTop="9px";
        tdM.innerHTML='<div style="display:flex;align-items:flex-start;gap:7px">'+
          monImgWithCtx(m.n,a.island,32)+
          '<div><div style="font-weight:600;font-size:13px">'+cleanN(m.n)+'</div>'+
          '<div style="margin-top:3px">'+bdg(r)+'</div>'+
          (item._needed?'<div style="margin-top:2px"><span class="bdg bdg-need">Needed</span></div>':"")+
          (item._zapTags?'<div style="margin-top:2px">'+item._zapTags.map(function(zt){return'<span class="bdg bdg-zap">Zap: '+zt.name+(zt.still?' ×'+zt.still:'')+'</span>';}).join(" ")+'</div>':"")+
          (item._wubFor?'<div style="margin-top:2px"><span class="bdg bdg-wub">Wubbox</span></div>':"")+
          (wbn.length&&!item._wubFor?'<div style="margin-top:2px"><span class="bdg bdg-wub">Wubbox</span></div>':"")+
          '</div></div>';
        tr.appendChild(tdM);
      }

      var tdI=document.createElement("td");
      tdI.style.cssText="font-size:12px;color:var(--tx2)";
      tdI.textContent=a.island;
      tr.appendChild(tdI);

      var tdC=document.createElement("td");
      tdC.style.cssText="font-size:12px;color:var(--tx2)";
      tdC.textContent=a.combo.join(" + ");
      tr.appendChild(tdC);

      var timeStr=a.time||(a.enhanced?"":"—");
      if(a.time&&a.enhanced)timeStr+=" / "+a.enhanced;
      var tdT=document.createElement("td");
      tdT.style.cssText="font-size:11px;color:var(--tx3);white-space:nowrap";
      tdT.textContent=timeStr||"—";
      tr.appendChild(tdT);

      var tdS=document.createElement("td");
      tdS.innerHTML=ownedHere?'<span style="color:var(--com);font-size:12px">&#10003; Owned</span>':"";
      tr.appendChild(tdS);

      tb.appendChild(tr);
    });
  });
  tbl.appendChild(tb);tw.appendChild(tbl);c.appendChild(tw);
}

// ZAPPING
function renderZapping(){
  var c=makePanel();
  var wrap=document.createElement("div");wrap.className="tab on";wrap.appendChild(c);
  document.getElementById("main").appendChild(wrap);

  var allEntries=Object.entries(S.zapTracked||{});
  // Apply saved order
  if(S.zapOrder&&S.zapOrder.length){
    allEntries.sort(function(a,b){
      var ai=S.zapOrder.indexOf(a[0]),bi=S.zapOrder.indexOf(b[0]);
      if(ai===-1)ai=9999;if(bi===-1)bi=9999;return ai-bi;
    });
  }
  var urg=allEntries.filter(function(e){var d=daysLeft(e[1].deadline);return d!==null&&d<=2&&d>0;}).length;
  var exp=allEntries.filter(function(e){return e[1].deadline&&daysLeft(e[1].deadline)===0;}).length;

  var sr=document.createElement("div");sr.className="zbar";
  sr.innerHTML='<div class="zsc"><div class="zsc-lbl">Active</div><div class="zsc-val" style="color:#bc8cff">'+allEntries.length+'</div></div>'+
    (urg>0?'<div class="zsc"><div class="zsc-lbl">≤2 Days Left</div><div class="zsc-val" style="color:var(--epi)">'+urg+'</div></div>':"")+ 
    (exp>0?'<div class="zsc"><div class="zsc-lbl">Expired</div><div class="zsc-val" style="color:#f85149">'+exp+'</div></div>':"");
  c.appendChild(sr);

  var hint=document.createElement("div");
  hint.style.cssText="font-size:11px;color:var(--tx3);margin-bottom:10px";
  hint.textContent="Drag ☰ to reorder";
  c.appendChild(hint);

  var tb=document.createElement("button");tb.className="btn-pri";tb.textContent="+ Track Monster";tb.style.marginBottom="13px";
  tb.addEventListener("click",openZapModal);c.appendChild(tb);

  if(!allEntries.length){var emp=document.createElement("div");emp.className="empty";emp.textContent="No monsters tracked. Click + Track Monster to start.";c.appendChild(emp);return;}

  var dragSrcId=null;

  allEntries.forEach(function(entry){
    var id=entry[0],z=entry[1];
    var days=daysLeft(z.deadline);
    var dlCls="dl-none",dlTxt="No deadline";
    if(days!==null){
      if(days===0){dlCls="dl-exp";dlTxt="EXPIRED";}
      else if(days<=2){dlCls="dl-urg";dlTxt=days+"d left";}
      else if(days<=5){dlCls="dl-warn";dlTxt=days+"d left";}
      else{dlCls="dl-ok";dlTxt=days+"d left";}
    }
    var eggs=parseEggs(z.eggs_required||"");
    var tNeed=0,tSent=0,tBred=0,tHave=0;
    Object.entries(eggs).forEach(function(ee){
      var need=ee[1];
      var sv=(z.sent&&z.sent[ee[0]])||0,bv=(z.bred&&z.bred[ee[0]])||0;
      tNeed+=need;
      var sc=Math.min(sv,need),bc=Math.min(bv,Math.max(0,need-sc));
      tSent+=sc;tBred+=bc;tHave+=sc+bc;
    });
    var pct=tNeed>0?Math.round(tHave/tNeed*100):0;
    var pctS=tNeed>0?Math.round(tSent/tNeed*100):0;
    var pctB=tNeed>0?Math.round(tBred/tNeed*100):0;

    var card=document.createElement("div");
    card.className="zcard";
    card.draggable=true;
    card.dataset.zapid=id;

    card.innerHTML=
      '<div class="ztop"><div style="display:flex;align-items:flex-start;gap:6px">'+
        '<span class="drag-handle" title="Drag to reorder">☰</span>'+
        monImg(z.monster_name,36)+
        '<div class="ztop-l"><span class="ztop-isl">'+z.island+'</span>'+z.monster_name+'</div></div>'+
      '<div class="ztop-r"><span class="dl '+dlCls+'">'+dlTxt+'</span>'+
      '<button class="btn-danger zrm-btn" data-zid="'+id+'">✕ Remove</button></div></div>'+
      '<div class="zprog"><div class="zprog-lbl">'+pct+'% — '+tHave+'/'+tNeed+' eggs '+
        '(<span style="color:var(--com)">'+tSent+' sent</span> / <span style="color:var(--epi)">'+tBred+' bred</span>)</div>'+
      '<div class="pbar" style="position:relative;height:8px;background:var(--bg4);border-radius:4px">'+
        '<div style="position:absolute;left:0;top:0;height:100%;width:'+Math.min(pctS,100)+'%;background:var(--com);border-radius:4px;transition:width .3s"></div>'+
        '<div style="position:absolute;left:'+pctS+'%;top:0;height:100%;width:'+Math.min(pctB,100)+'%;background:var(--epi);border-radius:4px;transition:width .3s"></div>'+
      '</div></div>';

    // Drag events
    card.addEventListener("dragstart",function(e){
      dragSrcId=id;
      card.classList.add("dragging");
      e.dataTransfer.effectAllowed="move";
    });
    card.addEventListener("dragend",function(){
      card.classList.remove("dragging");
      document.querySelectorAll(".zcard").forEach(function(c2){c2.classList.remove("drag-over");});
    });
    card.addEventListener("dragover",function(e){
      e.preventDefault();e.dataTransfer.dropEffect="move";
      if(dragSrcId!==id)card.classList.add("drag-over");
    });
    card.addEventListener("dragleave",function(){card.classList.remove("drag-over");});
    card.addEventListener("drop",function(e){
      e.preventDefault();
      card.classList.remove("drag-over");
      if(!dragSrcId||dragSrcId===id)return;
      // Reorder: move dragSrcId before this card
      var ids=allEntries.map(function(en){return en[0];});
      var fromIdx=ids.indexOf(dragSrcId),toIdx=ids.indexOf(id);
      if(fromIdx===-1||toIdx===-1)return;
      ids.splice(fromIdx,1);
      ids.splice(toIdx,0,dragSrcId);
      S.zapOrder=ids;
      saveS();renderAll();
    });

    if(Object.keys(eggs).length){
      var el=document.createElement("div");el.className="eggs";
      Object.entries(eggs).forEach(function(ee){
        var egg=ee[0],need=ee[1];
        var sv=(z.sent&&z.sent[egg])||0,bv=(z.bred&&z.bred[egg])||0;
        var done=sv>=need,partial=!done&&(sv+bv>0);
        var isRareFlex=/^rare flex\b/i.test(egg);
        var ei=document.createElement("div");
        if(isRareFlex){
          var flexOn=sv>=need;
          ei.className="egg"+(flexOn?" done":"");
          ei.innerHTML='<div style="display:flex;align-items:center;gap:5px">'+
            '<div class="egg-name" style="color:'+(flexOn?"var(--com)":"var(--tx)")+'">'+egg+' ×'+need+'</div>'+
            '<button class="btn-sm flex-tog" style="font-size:11px;padding:2px 7px;'+(flexOn?'background:rgba(63,185,80,.2);border-color:var(--com);color:var(--com)':'')+
            '" data-zid="'+id+'" data-egg="'+egg+'" data-need="'+need+'">'+(flexOn?"✓ Got it":"Get it")+'</button></div>';
        } else {
          ei.className="egg"+(done?" done":partial?" partial":"");
          ei.innerHTML='<div style="display:flex;align-items:center;gap:5px;margin-bottom:4px">'+
            monImg(egg,22)+
            '<div class="egg-name" style="color:'+(done?"var(--com)":partial?"var(--epi)":"var(--tx)")+'">'+egg+' ×'+need+'</div></div>'+
            '<div class="egg-inputs">'+
            '<div class="ein"><label>Sent</label><input type="number" min="0" max="'+need+'" value="'+sv+'" data-zid="'+id+'" data-egg="'+egg+'" data-type="sent"></div>'+
            '<div class="ein"><label>Bred</label><input type="number" min="0" max="'+need+'" value="'+bv+'" data-zid="'+id+'" data-egg="'+egg+'" data-type="bred"></div>'+
            '</div>';
        }
        el.appendChild(ei);
      });
      card.appendChild(el);
    }
    c.appendChild(card);
  });

  c.addEventListener("click",function(ev){
    // Remove button
    var btn=ev.target.closest(".zrm-btn");
    if(btn){var zid=btn.getAttribute("data-zid");if(zid&&S.zapTracked[zid]){delete S.zapTracked[zid];S.zapOrder=S.zapOrder.filter(function(i){return i!==zid;});saveS();renderAll();}}
    // Rare Flex toggle
    var ftog=ev.target.closest(".flex-tog");
    if(ftog){
      var zid=ftog.getAttribute("data-zid"),egg=ftog.getAttribute("data-egg"),need=parseInt(ftog.getAttribute("data-need"))||1;
      if(zid&&S.zapTracked[zid]){
        if(!S.zapTracked[zid].sent)S.zapTracked[zid].sent={};
        var cur=(S.zapTracked[zid].sent[egg]||0);
        S.zapTracked[zid].sent[egg]=cur>=need?0:need;
        saveS();updateZapCard(zid);
        // Re-render just this toggle button
        ftog.classList.toggle("done");
        var on=S.zapTracked[zid].sent[egg]>=need;
        ftog.textContent=on?"✓ Got it":"Get it";
        ftog.style.background=on?"rgba(63,185,80,.2)":"";
        ftog.style.borderColor=on?"var(--com)":"";
        ftog.style.color=on?"var(--com)":"";
        var nameEl=ftog.previousElementSibling;
        if(nameEl)nameEl.style.color=on?"var(--com)":"var(--tx)";
        ftog.closest(".egg").className="egg"+(on?" done":"");
      }
    }
  });
  c.addEventListener("change",function(ev){
    var t=ev.target;
    if(t.tagName==="INPUT"&&t.dataset.zid){
      var zid=t.dataset.zid,egg=t.dataset.egg,type=t.dataset.type;
      if(!S.zapTracked[zid])return;
      if(!S.zapTracked[zid][type])S.zapTracked[zid][type]={};
      S.zapTracked[zid][type][egg]=parseInt(t.value)||0;
      saveS();
      // Update just this card in-place without full re-render
      updateZapCard(zid);
    }
  });
}

function updateZapCard(zid){
  var z=S.zapTracked[zid];if(!z)return;
  var card=document.querySelector(".zcard[data-zapid='"+zid+"']");
  if(!card)return;
  var eggs=parseEggs(z.eggs_required||"");
  var tNeed=0,tSent=0,tBred=0,tHave=0;
  Object.entries(eggs).forEach(function(ee){
    var need=ee[1],sv=(z.sent&&z.sent[ee[0]])||0,bv=(z.bred&&z.bred[ee[0]])||0;
    tNeed+=need;
    var sc=Math.min(sv,need),bc=Math.min(bv,Math.max(0,need-sc));
    tSent+=sc;tBred+=bc;tHave+=sc+bc;
  });
  var pct=tNeed>0?Math.round(tHave/tNeed*100):0;
  var pctS=tNeed>0?Math.round(tSent/tNeed*100):0;
  var pctB=tNeed>0?Math.round(tBred/tNeed*100):0;
  // Update progress label
  var lbl=card.querySelector(".zprog-lbl");
  if(lbl)lbl.innerHTML=pct+"% — "+tHave+"/"+tNeed+" eggs "+
    '(<span style="color:var(--com)">'+tSent+' sent</span> / <span style="color:var(--epi)">'+tBred+' bred</span>)';
  // Update progress bars
  var bars=card.querySelectorAll(".pbar > div");
  if(bars[0])bars[0].style.width=Math.min(pctS,100)+"%";
  if(bars[1])bars[1].style.width=Math.min(pctB,100)+"%";
  if(bars[1])bars[1].style.left=pctS+"%";
  // Update egg item colours - use data-egg attribute for reliable name lookup
  card.querySelectorAll(".egg").forEach(function(ei){
    var nameEl=ei.querySelector(".egg-name");
    if(!nameEl)return;
    var inputs=ei.querySelectorAll("input");
    if(inputs.length<2)return;
    var sv2=parseInt(inputs[0].value)||0,bv2=parseInt(inputs[1].value)||0;
    var eggKey=inputs[0].getAttribute("data-egg")||"";
    var need2=eggKey?eggs[eggKey]:0;
    if(!need2){ei.className="egg";nameEl.style.color="var(--tx)";return;}
    var done=sv2>=need2,partial=!done&&(sv2+bv2>0);
    ei.className="egg"+(done?" done":partial?" partial":"");
    nameEl.style.color=done?"var(--com)":partial?"var(--epi)":"var(--tx)";
  });
}

function renderWubbox(){

  var boxedCount=bList.filter(function(m){return boxed[m];}).length;
