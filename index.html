  var st=document.createElement("div");st.className="stats";
  st.innerHTML='<div class="sc"><div class="sc-lbl">Boxed</div><div class="sc-val">'+boxedCount+'</div><div class="sc-sub">of '+bList.length+'</div></div>'+
    '<div class="sc"><div class="sc-lbl">Still Needed</div><div class="sc-val">'+(bList.length-boxedCount)+'</div></div>'+
    '<div class="sc"><div class="sc-lbl">Progress</div><div class="sc-val">'+pct+'%</div></div>';
  c.appendChild(st);

  var pg=document.createElement("div");pg.style.cssText="margin:0 0 11px";
  pg.innerHTML='<div class="pbar" style="height:9px"><div class="pfill'+(pct>=100?" done":"")+'" style="width:'+pct+'%"></div></div>';
  c.appendChild(pg);

  if(!bList.length){var emp=document.createElement("div");emp.className="empty";emp.textContent="No wubbox data.";c.appendChild(emp);return;}

  var allBtn=document.createElement("button");allBtn.className="btn-sm";allBtn.style.marginBottom="10px";
  allBtn.textContent=boxedCount===bList.length?"Unbox All":"Box All";
  allBtn.addEventListener("click",function(){
    var v=boxedCount!==bList.length;bList.forEach(function(m){boxed[m]=v?1:0;});saveS();renderAll();
  });
  c.appendChild(allBtn);

  var grid=document.createElement("div");grid.className="wgrid";
  bList.forEach(function(mn){
    var isBoxed=!!boxed[mn];
    var isNeed=isWubNeeded(key,S.wbType,mn);
    var wi=document.createElement("div");
    wi.className="wi"+(isBoxed?" boxed":"")+(isNeed?" wi-need":"");
    wi.innerHTML='<div class="wichk">'+(isBoxed?"✓":"")+'</div>'+monImgWithCtx(mn,key,28)+
      '<div style="flex:1;min-width:0">'+
        '<div style="font-size:12px">'+mn+'</div>'+
        (isNeed?'<div style="font-size:10px;color:#56b4e9;margin-top:1px">⭐ Needed</div>':"")+
      '</div>'+
      '<button class="wb-need-btn btn-sm" style="flex-shrink:0;font-size:13px;padding:2px 5px;'+(isNeed?'background:rgba(86,180,233,.2);border-color:#56b4e9;color:#56b4e9':'color:var(--tx3)')+';" title="'+(isNeed?"Unmark":"Mark as")+' needed">⭐</button>';
    wi.addEventListener("click",function(e){
      if(e.target.classList.contains("wb-need-btn")){
        setWubNeeded(key,S.wbType,mn,!isNeed);renderAll();return;
      }
      boxed[mn]=isBoxed?0:1;saveS();renderAll();
    });
    grid.appendChild(wi);
  });
  c.appendChild(grid);
}

// AVAILABILITY HELPERS
var _avKey=null;
var _avKeys=[];
function availDaysLeft(until){
  if(!until)return null;
  var d=Math.ceil((until-Date.now())/(864e5));
  return d>0?d:0;
}
function isAvailNow(key){
  if(!S.avail||!S.avail[key])return false;
  var u=S.avail[key].until;
  if(!u)return true;
  return u>Date.now();
}
function openAvailModal(key){
  // Single-key mode (Edit button on cards)
  _avKey=key;
  _avKeys=[key];
  var m=DB.monsters.find(function(x){return x.n+" ("+x.r+")"===key;});
  document.getElementById("av_title").textContent="Mark Available: "+(m?m.n:key);
  var existing=S.avail&&S.avail[key];
  var curDays=existing&&existing.until?Math.ceil((existing.until-Date.now())/864e5):null;
  document.getElementById("av_days").value=curDays&&curDays>0?curDays:"";
  document.getElementById("availModal").classList.add("on");
  setTimeout(function(){document.getElementById("av_days").focus();},50);
}
function openAvailBatch(){
  // Multi-key mode (Add X Selected button in picker)
  if(!_avKeys.length)return;
  closeAvailAddModal();
  _avKey=null;
  var count=_avKeys.length;
  document.getElementById("av_title").textContent=count===1
    ?(function(){var m=DB.monsters.find(function(x){return x.n+" ("+x.r+")"===_avKeys[0];});return"Mark Available: "+(m?m.n:_avKeys[0]);})()
    :"Mark "+count+" Monsters Available";
  document.getElementById("av_days").value="";
  document.getElementById("availModal").classList.add("on");
  setTimeout(function(){document.getElementById("av_days").focus();},50);
}
function closeAvailModal(){document.getElementById("availModal").classList.remove("on");}
function confirmAvail(){
  var keys=_avKeys.length?_avKeys:(_avKey?[_avKey]:[]);
  if(!keys.length)return;
  if(!S.avail)S.avail={};
  var days=parseInt(document.getElementById("av_days").value)||0;
  var until=days>0?Date.now()+days*864e5:null;
  keys.forEach(function(k){S.avail[k]={until:until};});
  _avKeys=[];_avKey=null;
  saveS();closeAvailModal();closeAvailAddModal();renderAll();
}
function openAvailAddModal(){
  _avKeys=[];
  var modal=document.getElementById("availAddModal");
  // Populate class filter
  var clsSel=document.getElementById("aas_cls");
  clsSel.innerHTML='<option value="">All Classes</option>';
  Array.from(new Set(DB.monsters.map(function(m){return m.c;}).filter(Boolean))).sort().forEach(function(cl){
    clsSel.innerHTML+='<option value="'+cl+'">'+cl+'</option>';
  });
  // Populate elements filter
  var elemSel=document.getElementById("aas_elem");
  elemSel.innerHTML='<option value="">All Elements</option>';
  var allElems=[];
  DB.monsters.forEach(function(m){(m.e||[]).forEach(function(el){if(allElems.indexOf(el)===-1)allElems.push(el);});});
  allElems.sort().forEach(function(el){elemSel.innerHTML+='<option value="'+el+'">'+el+'</option>';});
  // Populate islands filter
  var islSel=document.getElementById("aas_isl");
  islSel.innerHTML='<option value="">All Islands</option>';
  ISO.forEach(function(isl){islSel.innerHTML+='<option value="'+isl+'">'+isl+'</option>';});
  // Reset all filters
  document.getElementById("aas_srch").value="";
  document.getElementById("aas_rar").value="";
  clsSel.value="";elemSel.value="";islSel.value="";
  renderAvailAddList();
  modal.classList.add("on");
  setTimeout(function(){document.getElementById("aas_srch").focus();},50);
  document.getElementById("aas_srch").oninput=renderAvailAddList;
  document.getElementById("aas_rar").onchange=renderAvailAddList;
  document.getElementById("aas_cls").onchange=renderAvailAddList;
  document.getElementById("aas_elem").onchange=renderAvailAddList;
  document.getElementById("aas_isl").onchange=renderAvailAddList;
}
function closeAvailAddModal(){document.getElementById("availAddModal").classList.remove("on");}
function updateAasBtn(){
  var btn=document.getElementById("aas_addBtn");if(!btn)return;
  var n=_avKeys.length;
  btn.textContent="Add "+n+" Selected";
  btn.disabled=n===0;
  btn.style.opacity=n===0?"0.45":"1";
  btn.style.cursor=n===0?"not-allowed":"pointer";
}
function renderAvailAddList(){
  var srch=(document.getElementById("aas_srch").value||"").toLowerCase();
  var rarFil=document.getElementById("aas_rar").value;
  var clsFil=document.getElementById("aas_cls").value;
  var elemFil=document.getElementById("aas_elem").value;
  var islFil=document.getElementById("aas_isl").value;
  var ms=DB.monsters.filter(function(m){
    if(srch&&m.n.toLowerCase().indexOf(srch)===-1)return false;
    if(rarFil&&m.r!==rarFil)return false;
    if(clsFil&&m.c!==clsFil)return false;
    if(elemFil&&(!m.e||m.e.indexOf(elemFil)===-1))return false;
    if(islFil&&(!m.islands||!m.islands.some(function(a){return a.island===islFil;})))return false;
    return true;
  });
  var list=document.getElementById("aas_list");
  list.innerHTML="";
  if(!ms.length){
    list.innerHTML='<div style="padding:16px;text-align:center;color:var(--tx3);font-size:12px">No monsters found</div>';
    updateAasBtn();return;
  }
  ms.forEach(function(m){
    var key=m.n+" ("+m.r+")";
    var isAv=isAvailNow(key);
    var isSel=_avKeys.indexOf(key)>-1;
    var r2=rar(m.n);
    var firstIsl=(m.i&&m.i[0])||"";
    var row=document.createElement("div");
    var baseBg=isSel?"rgba(99,102,241,.12)":isAv?"rgba(63,185,80,.07)":"";
    row.style.cssText="display:flex;align-items:center;gap:9px;padding:8px 11px;cursor:pointer;border-bottom:1px solid var(--brd);transition:background .1s;background:"+baseBg;
    row.onmouseover=function(){this.style.background="var(--bg3)";};
    row.onmouseout=function(){
      var sel=_avKeys.indexOf(key)>-1;
      this.style.background=sel?"rgba(99,102,241,.12)":isAv?"rgba(63,185,80,.07)":"";
    };
    // Checkbox
    var cb=document.createElement("input");
    cb.type="checkbox";
    cb.checked=isSel;
    cb.style.cssText="width:15px;height:15px;flex-shrink:0;cursor:pointer;accent-color:var(--acc2)";
    cb.addEventListener("change",function(e){
      e.stopPropagation();
      var idx=_avKeys.indexOf(key);
      if(this.checked&&idx===-1)_avKeys.push(key);
      else if(!this.checked&&idx>-1)_avKeys.splice(idx,1);
      // update row highlight
      var sel=_avKeys.indexOf(key)>-1;
      row.style.background=sel?"rgba(99,102,241,.12)":isAv?"rgba(63,185,80,.07)":"";
      updateAasBtn();
    });
    row.appendChild(cb);
    var info=document.createElement("div");
    info.style.cssText="display:flex;align-items:center;gap:9px;flex:1;min-width:0";
    info.innerHTML=monImgWithCtx(m.n,firstIsl,28)+
      '<div style="flex:1;min-width:0">'+
        '<span style="font-size:13px;font-weight:500">'+m.n+'</span>'+
        '<span class="bdg bdg-'+r2+'" style="margin-left:5px">'+m.r+'</span>'+
        (isAv?'<span style="margin-left:5px;font-size:10px;color:var(--com)">✓ Available</span>':"")+
        '<div style="font-size:10px;color:var(--tx3)">'+m.c+'</div>'+
      '</div>';
    row.appendChild(info);
    // Clicking row body toggles checkbox
    row.addEventListener("click",function(e){
      if(e.target===cb||e.target.tagName==="INPUT")return;
      cb.checked=!cb.checked;
      cb.dispatchEvent(new Event("change"));
    });
    list.appendChild(row);
  });
  updateAasBtn();
}
function removeAvail(key){delete S.avail[key];saveS();renderAll();}
// Auto-purge expired entries
function purgeExpiredAvail(){
  if(!S.avail)return;
  Object.keys(S.avail).forEach(function(k){
    var u=S.avail[k]&&S.avail[k].until;
    if(u&&u<=Date.now())delete S.avail[k];
  });
}

// DATABASE
var CORE_ELEMENTS=["Air","Plant","Cold","Water","Earth","Fire","Light","Psychic","Faerie","Bone","Plasma","Shadow","Mech","Electricity","Mythical","Legendary","Crystal","Depths","Dream","Ruin","Control","Poison","Dipster","Titansoul","Primordial Air","Primordial Cold","Primordial Plant","Life-Formula","SkyPainting","MindBoggle","Perplexplore","Beat Hereafter","Crescendo Moon"];

function renderDatabase(){
  var c=makePanel();
  var wrap=document.createElement("div");wrap.className="tab on";wrap.appendChild(c);
  document.getElementById("main").appendChild(wrap);

  var classes=[...new Set(DB.monsters.map(function(m){return m.c;}).filter(Boolean))].sort();
  var fr=document.createElement("div");fr.className="dbf";
  var classOpts=classes.map(function(cl){return '<option value="'+cl+'"'+(S.dbClass===cl?' selected':'')+'>'+cl+'</option>';}).join('');
  var elemOpts=CORE_ELEMENTS.map(function(e){return '<option value="'+e+'"'+(S.dbElem===e?' selected':'')+'>'+e+'</option>';}).join('');
  var islOpts=ISO.map(function(i){return '<option value="'+i+'"'+(S.dbIsland===i?' selected':'')+'>'+i+'</option>';}).join('');
  fr.innerHTML=
    '<input type="text" id="dbSrch" placeholder="&#128269; Search…" value="'+S.dbSearch+'" style="min-width:160px">'+
    '<select id="dbRar"><option value="">All Rarities</option><option value="C"'+(S.dbRarity==="C"?" selected":"")+'>Common</option><option value="R"'+(S.dbRarity==="R"?" selected":"")+'>Rare</option><option value="E"'+(S.dbRarity==="E"?" selected":"")+'>Epic</option></select>'+
    '<select id="dbCls"><option value="">All Classes</option>'+classOpts+'</select>'+
    '<select id="dbElem"><option value="">All Elements</option>'+elemOpts+'</select>'+
    '<select id="dbIsl" style="max-width:170px"><option value="">All Islands</option>'+islOpts+'</select>';
  c.appendChild(fr);
  document.getElementById("dbSrch").oninput=function(){S.dbSearch=this.value;saveS();debounceRender();};
  document.getElementById("dbRar").onchange=function(){S.dbRarity=this.value;saveS();renderAll();};
  document.getElementById("dbCls").onchange=function(){S.dbClass=this.value;saveS();renderAll();};
  document.getElementById("dbElem").onchange=function(){S.dbElem=this.value;saveS();renderAll();};
  document.getElementById("dbIsl").onchange=function(){S.dbIsland=this.value;saveS();renderAll();};

  var list=DB.monsters.slice();
  if(S.dbSearch){var s2=S.dbSearch.toLowerCase();list=list.filter(function(m){return m.n.toLowerCase().indexOf(s2)>-1;});}
  if(S.dbRarity)list=list.filter(function(m){return rar(m.n)===S.dbRarity;});
  if(S.dbClass)list=list.filter(function(m){return m.c===S.dbClass;});
  if(S.dbElem)list=list.filter(function(m){return m.e.indexOf(S.dbElem)>-1;});
  if(S.dbIsland)list=list.filter(function(m){return m.i.indexOf(S.dbIsland)>-1;});

  var cnt=document.createElement("div");cnt.className="cnt";cnt.textContent=list.length+" of "+DB.monsters.length+" monsters";c.appendChild(cnt);
  if(!list.length){var emp=document.createElement("div");emp.className="empty";emp.textContent="No results.";c.appendChild(emp);return;}

  // Helper: return array of {label, col} obtain methods for an appearance
  // Supports dual-obtain (combo + obtain both set on same entry)
  var TELEPORT_REQS={
    "Gold Island":"Level 15",
    "Shugabush Island":"Level 15",
    "Colossingum":"Level 5",
    "Ethereal Island":"Level 15",
    "Seasonal Shanty":"Level 15",
    "Mythical Island":"Level 15",
    "Magical Sanctum":"Level 15",
    "Major Paironormal Carnival":"Level 18",
    "Magical Nexus":"Level 18"
  };
  function obtainColor(obtainStr){
    var o=(obtainStr||"").toLowerCase();
    if(o==="zapping")return"#bc8cff";
    if(o==="teleport")return"var(--rar)";
    if(o==="harmonizing")return"#ec4899";
    if(o==="evolve")return"#ef4444";
    if(o.indexOf("fug")>-1)return"var(--epi)";
    if(o.indexOf("synth")>-1)return"var(--epi)";
    if(o.indexOf("coin")>-1)return"#ca8a04";
    if(o.indexOf("relic")>-1)return"#ea580c";
    if(o.indexOf("diamond")>-1)return"#16a34a";
    if(o.indexOf("starpower")>-1||o.indexOf("stardust")>-1)return"#0ea5e9";
    if(o.indexOf("keys")>-1)return"#6b7280";
    if(o.indexOf("shard")>-1)return"#7e22ce";
    if(o==="transpose")return"var(--rar)";
    return"var(--tx2)";
  }
  // Obtains where the label itself describes the breeding process — don't also add "Breeding"
  var IMPLICIT_BREED={"Synthesis":1,"Harmonizing":1,"Fuging":1};
  function displayObtain(a){
    // Rename Teleport → Transpose for Magical Nexus
    if(a.obtain==="Teleport"&&a.island==="Magical Nexus")return"Transpose";
    return a.obtain;
  }
  function dbObtainMethods(a){
    var methods=[];
    // Obtain (e.g. Teleport/Transpose) comes first so it aligns with Requirements column order
    if(a.obtain){
      var lbl=displayObtain(a);
      methods.push({label:lbl,col:obtainColor(lbl)});
    }
    if(a.combo&&a.combo.length&&!IMPLICIT_BREED[a.obtain]){
      methods.push({label:"Breeding",col:"var(--com)"});
    }
    if(a.failed_attempt&&!methods.length)methods.push({label:"Failed Attempt",col:"var(--tx3)"});
    if(!methods.length)methods.push({label:"—",col:"var(--tx3)"});
    return methods;
  }
  function dbRequirements(a,m){
    var parts=[];
    // Teleport level requirement
    // Per-entry custom requirement (overrides everything for that monster+island)
    if(a.req){
      parts.push('<span style="font-size:11px;color:var(--tx2)">'+a.req+'</span>');
    }
    // Teleport level requirement (island-wide fallback when no custom req)
    if(!a.req&&(a.obtain==="Teleport"||a.obtain==="Transpose")&&TELEPORT_REQS[a.island]){
      parts.push('<span style="font-size:11px;color:var(--tx2)">'+TELEPORT_REQS[a.island]+'</span>');
    }
    // Evolve requirement (compute from monster name/rarity)
    if(a.obtain==="Evolve"){
      var baseName=m.n.replace(/^(Rare|Epic)\s+/i,"");
      var from=m.r==="Epic"?"Rare "+baseName:baseName;
      parts.push('<span style="font-size:11px;color:var(--tx2)">'+from+'</span>');
    }
    // Breeding combo (after Teleport, aligning with Obtain column order)
    if(a.combo&&a.combo.length){
      parts.push('<span style="font-size:11px;color:var(--tx2)">'+a.combo.join(" + ")+'</span>');
    }
    // Zapping egg requirements (text-only, no images, no Rare Flex variants)
    if(a.obtain==="Zapping"){
      var zt=(DB.zapTargets||[]).find(function(t){
        return cleanN(t.n).toLowerCase()===cleanN(m.n).toLowerCase()&&t.island===a.island;
      });
      if(zt&&zt.requirements&&zt.requirements.length){
        var reqStr=zt.requirements
          .filter(function(req){return req.monster.toLowerCase().indexOf("rare flex")===-1;})
          .map(function(req){return req.monster+" \xD7"+req.eggs;})
          .join(", ");
        if(reqStr)parts.push('<span style="font-size:11px;color:var(--tx2)">'+reqStr+'</span>');
      }
    }
    return parts.length?parts.join('<br>'):"—";
  }

  var tw=document.createElement("div");tw.className="twrap";
  var tbl=document.createElement("table");
  tbl.innerHTML='<thead><tr><th>Monster</th><th>Rarity</th><th>Class</th><th>Elements</th><th>Island</th><th>Obtain</th><th>Combo / Requirements</th><th>Breeding/Incubation Time</th><th>Owned</th></tr></thead>';
  var tb=document.createElement("tbody");

  list.forEach(function(m){
    var legN=m.n+" ("+m.r+")";
    var r=rar(m.n);
    var firstIsl=(m.i&&m.i[0])||"";
    var elemHtml=m.e.map(function(el){
      return '<span style="display:inline-flex;align-items:center;gap:2px;margin:1px">'+elemImg(el)+'<span style="font-size:11px">'+el+'</span></span>';
    }).join(" ");

    // Use filtered appearances when island filter is active, all otherwise
    var apps=(m.islands||[]);
    if(S.dbIsland)apps=apps.filter(function(a){return a.island===S.dbIsland;});
    if(!apps.length)apps=[{island:"",combo:null,obtain:""}]; // placeholder row

    var ownAny=m.i.some(function(isl){return isOwned(isl,legN);});

    apps.forEach(function(a,idx){
      var tr=document.createElement("tr");
      if(idx===0)tr.className="br-sep";

      if(idx===0){
        // Monster-level cells (span all island rows)
        var tdMon=document.createElement("td");
        tdMon.rowSpan=apps.length;
        tdMon.style.verticalAlign="top";
        tdMon.style.paddingTop="9px";
        tdMon.innerHTML='<div style="display:flex;align-items:flex-start;gap:6px">'+
          monImgWithCtx(m.n,firstIsl,28)+
          '<span'+(ownAny?' style="color:var(--com)"':'')+'>'+m.n+(ownAny?" ✓":"")+'</span></div>';
        tr.appendChild(tdMon);

        var tdRar=document.createElement("td");
        tdRar.rowSpan=apps.length;
        tdRar.style.verticalAlign="top";
        tdRar.style.paddingTop="9px";
        tdRar.innerHTML=bdg(r);
        tr.appendChild(tdRar);

        var tdCls=document.createElement("td");
        tdCls.rowSpan=apps.length;
        tdCls.style.verticalAlign="top";
        tdCls.style.paddingTop="9px";
        tdCls.innerHTML='<span class="tag">'+(m.c||"&#8212;")+'</span>';
        tr.appendChild(tdCls);

        var tdEl=document.createElement("td");
        tdEl.rowSpan=apps.length;
        tdEl.style.verticalAlign="top";
        tdEl.style.paddingTop="9px";
        tdEl.innerHTML=elemHtml||"&#8212;";
        tr.appendChild(tdEl);
      }

      // Island cell
      var tdIsl=document.createElement("td");
      tdIsl.style.cssText="font-size:12px;color:var(--tx2)";
      tdIsl.textContent=a.island||"&#8212;";
      tr.appendChild(tdIsl);

      // Obtain cell (multi-method, color-coded)
      var obMethods=dbObtainMethods(a);
      var tdObt=document.createElement("td");
      if(a.island){
        tdObt.innerHTML=obMethods.map(function(ob){
          return '<span style="font-size:11px;font-weight:600;color:'+ob.col+'">'+ob.label+'</span>';
        }).join('<br>');
      }
      tr.appendChild(tdObt);

      // Combo / Requirements cell
      var tdDet=document.createElement("td");
      tdDet.style.lineHeight="1.7";
      tdDet.innerHTML=a.island?dbRequirements(a,m):"";
      tr.appendChild(tdDet);

      // Breeding/Incubation Time
      var tdTime=document.createElement("td");
      tdTime.style.cssText="font-size:11px;color:var(--tx3);white-space:nowrap";
      tdTime.textContent=a.time?(a.time+(a.enhanced?" / "+a.enhanced:"")):"—";
      tr.appendChild(tdTime);

      // Owned (per-island)
      var tdOwn=document.createElement("td");
      if(a.island){
        var ownedHere=isOwned(a.island,legN);
        tdOwn.innerHTML=ownedHere?'<span style="color:var(--com);font-size:13px">&#10003;</span>':"";
      }
      tr.appendChild(tdOwn);

      tb.appendChild(tr);
    });
  });

  tbl.appendChild(tb);tw.appendChild(tbl);c.appendChild(tw);
}

// AVAILABLE NOW
function renderAvailable(){
  if(!S.avail)S.avail={};
  purgeExpiredAvail();

  var c=makePanel();
  var wrap=document.createElement("div");wrap.className="tab on";wrap.appendChild(c);
  document.getElementById("main").appendChild(wrap);  // append to DOM first so getElementById works

  // Sort available keys: soonest-expiring first, then indefinite, then by name
  var availKeys=Object.keys(S.avail).filter(function(k){return S.avail[k];});
  availKeys.sort(function(a,b){
    var ua=S.avail[a]&&S.avail[a].until;var ub=S.avail[b]&&S.avail[b].until;
    if(ua&&ub)return ua-ub;
    if(ua&&!ub)return -1;
    if(!ua&&ub)return 1;
    return a.localeCompare(b);
  });

  // Header
  var hdr=document.createElement("div");
  hdr.style.cssText="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px";
  hdr.innerHTML=
    '<div>'+
      '<h2 style="font-size:16px;font-weight:700">Currently Available</h2>'+
      '<p style="font-size:12px;color:var(--tx3);margin-top:3px">Track which monsters are currently obtainable — seasonal, event, or returning.</p>'+
    '</div>'+
    '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'+
      '<a href="https://mysingingmonsters.fandom.com/wiki/Breeding_Availability#Currently_Available_Monsters" target="_blank" style="font-size:12px;color:var(--rar);text-decoration:none;display:flex;align-items:center;gap:4px" title="MSM Wiki — currently available monsters">&#128279; MSM Wiki &#8599;</a>'+
    '</div>';
  // second hdr row for actions (rebuilt below)
  c.appendChild(hdr);
  var actRow=document.createElement("div");
  actRow.style.cssText="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap";
  actRow.innerHTML=
    '<span style="font-size:13px;color:var(--tx2)"><strong style="color:var(--tx)">'+availKeys.length+'</strong> available</span>'+
    (availKeys.length?'<button class="btn-danger" id="avClearAll">Clear All</button>':'')+
    '<button class="btn-pri" id="avAddBtn">＋ Add Monster</button>';
  c.appendChild(actRow);
  document.getElementById("avAddBtn").addEventListener("click",openAvailAddModal);
  if(availKeys.length)document.getElementById("avClearAll").addEventListener("click",function(){S.avail={};saveS();renderAll();});

  if(!availKeys.length){
    var emp=document.createElement("div");
    emp.style.cssText="background:var(--bg2);border:1px solid var(--brd);border-radius:11px;padding:40px;text-align:center;color:var(--tx3)";
    emp.innerHTML='<div style="font-size:32px;margin-bottom:10px">📋</div>'+
      '<div style="font-size:14px;font-weight:600;color:var(--tx2);margin-bottom:6px">No monsters marked yet</div>'+
      '<div style="font-size:12px">Click <strong style="color:var(--acc2)">＋ Add Monster</strong> to search and mark monsters that are currently available.</div>';
    c.appendChild(emp);
    return;
  }

  var grid=document.createElement("div");grid.className="mgrid";

  availKeys.forEach(function(key){
    var m=DB.monsters.find(function(x){return x.n+" ("+x.r+")"===key;});
    if(!m)return;
    var r=rar(m.n);
    var daysL=availDaysLeft(S.avail[key]&&S.avail[key].until);
    var timeLabel=daysL===null?'<span style="color:var(--com);font-size:10px">∞ No expiry</span>':
      daysL===0?'<span style="color:#f85149;font-size:10px">Expires today!</span>':
      '<span style="color:var(--epi);font-size:10px">'+daysL+' day'+(daysL===1?"":"s")+' left</span>';

    // Build combo/requirement string for this monster
    var comboStr="";
    if(m.islands){
      var withCombo=m.islands.find(function(a){return a.combo&&a.combo.length;});
      if(withCombo)comboStr=withCombo.combo.join(" + ");

// ── CLOUD SYNC ────────────────────────────────────────────────────────────────
// Island images are excluded from cloud sync — they are large base64 blobs
// that would quickly exceed Supabase free tier row size limits.
// They stay local-only in localStorage.
function cloudSafeState(){
  var copy=JSON.parse(JSON.stringify(S));
  delete copy.islandImages; // keep images local only
  return copy;
}

function scheduleSyncSave(){
  if(!_sb||!_sbUser)return;
  clearTimeout(_syncTmr);
  setSyncStatus("⟳ Saving…","var(--tx3)");
  _syncTmr=setTimeout(function(){cloudSave();},2500);
}

function cloudSave(){
  if(!_sb||!_sbUser)return;
  S.lastSaved=Date.now();
  try{localStorage.setItem("msm4",JSON.stringify(S));}catch(e){}
  var payload={id:_sbUser.id,data:cloudSafeState(),updated_at:new Date().toISOString()};
  _sb.from("user_saves").upsert(payload).then(function(res){
    if(res.error){setSyncStatus("✕ Sync failed","#f85149");}
    else{setSyncStatus("✓ Synced","var(--com)");}
  });
}

function cloudLoad(){
  if(!_sb||!_sbUser)return;
  setSyncStatus("⟳ Loading…","var(--tx3)");
  _sb.from("user_saves").select("data").eq("id",_sbUser.id).single().then(function(res){
    if(res.error||!res.data){setSyncStatus("☁ No cloud save","var(--tx3)");return;}
    var cloud=res.data.data;
    var localTime=S.lastSaved||0;
    var cloudTime=cloud.lastSaved||0;
    if(cloudTime>localTime){
      var localImages=S.islandImages||{};
      Object.assign(S,cloud);
      S.islandImages=localImages; // restore local images
      try{localStorage.setItem("msm4",JSON.stringify(S));}catch(e){}
      renderAll();
      setSyncStatus("✓ Synced","var(--com)");
    } else {
      // Local is newer — push it up
      cloudSave();
    }
  });
}
